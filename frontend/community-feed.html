<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Feed — SafeRoute BD</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/contrast.css" />
  <style>
    :root { --navy: #0D1B2A; --navy-light: #1A2D42; --teal: #1DBF8A; --border: rgba(29, 191, 138, 0.15); }
    body { font-family: 'Inter', sans-serif; background: var(--navy); color: #E8EFF8; min-height: 100vh; }
    .navbar-custom { background: rgba(13,27,42,0.95); border-bottom: 1px solid var(--border); padding: 1rem 0; }
    .navbar-brand-text { font-weight: 700; font-size: 1.25rem; background: linear-gradient(135deg,#1DBF8A,#63E6BE); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card-custom { background: var(--navy-light); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .filter-btn { background: rgba(255,255,255,0.05); color: #C8D8E8; border: 1px solid var(--border); border-radius: 50px; padding: 0.3rem 1rem; font-size: 0.85rem; margin: 0.2rem; transition: all 0.2s; }
    .filter-btn:hover, .filter-btn.active { background: var(--teal); color: #fff; border-color: var(--teal); }
    .cat-badge { font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 6px; text-transform: uppercase; }
    .bg-theft { background: rgba(245,158,11,0.15); color: #F59E0B; border: 1px solid rgba(245,158,11,0.3); }
    .bg-harassment { background: rgba(220,53,69,0.15); color: #FF8F96; border: 1px solid rgba(220,53,69,0.3); }
    .bg-accident { background: rgba(220,53,69,0.15); color: #FF8F96; border: 1px solid rgba(220,53,69,0.3); }
    .bg-road_hazard { background: rgba(245,158,11,0.15); color: #F59E0B; border: 1px solid rgba(245,158,11,0.3); }
    .bg-suspicious { background: rgba(29,191,138,0.15); color: var(--teal); border: 1px solid var(--border); }
    .bg-waterlogging { background: rgba(13,110,253,0.15); color: #6EA8FE; border: 1px solid rgba(13,110,253,0.3); }
    .bg-other { background: rgba(255,255,255,0.1); color: #C8D8E8; border: 1px solid rgba(255,255,255,0.2); }
    .upvote-btn { background: none; border: none; color: #8A9BB0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: color 0.2s; }
    .upvote-btn:hover { color: var(--teal); }
    .upvote-btn i { font-size: 1.2rem; margin-bottom: -5px; }
    .upvote-count { font-size: 0.8rem; font-weight: 700; }
  </style>
</head>
<body>
  <nav class="navbar navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-shield-shaded" style="color:var(--teal);font-size:1.4rem;"></i>
        <span class="navbar-brand-text">SafeRoute BD</span>
      </a>
      <button class="btn btn-outline-light btn-sm" onclick="goBack()"><i class="bi bi-arrow-left"></i> Back</button>
    </div>
  </nav>

  <div class="container mt-4 mb-5">
    <div class="text-center mb-4">
      <h3 class="fw-bold">Community Feed</h3>
      <p class="text-muted small">Stay updated on recent incidents reported in your community.</p>
    </div>
    
    <div class="d-flex justify-content-center flex-wrap mb-4" id="filters">
      <button class="filter-btn active" onclick="setFilter('')">All</button>
      <button class="filter-btn" onclick="setFilter('THEFT')">Theft</button>
      <button class="filter-btn" onclick="setFilter('ACCIDENT')">Accident</button>
      <button class="filter-btn" onclick="setFilter('ROAD_HAZARD')">Road Hazard</button>
      <button class="filter-btn" onclick="setFilter('HARASSMENT')">Harassment</button>
      <button class="filter-btn" onclick="setFilter('WATERLOGGING')">Waterlogging</button>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8" id="feedContainer">
        <div id="errorMsg" class="alert alert-danger" style="display:none;"></div>
        <div class="text-center mt-5" id="loadingFeed">
          <div class="spinner-border text-success" role="status"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function getUser() {
      const token = localStorage.getItem('token');
      if (!token) return null;
      try { return JSON.parse(atob(token.split('.')[1])); } catch(e) { return null; }
    }

    const user = getUser();
    let currentFilter = '';

    function goBack() { 
      if (user) {
        window.location.href = user.role === 'ADMIN' ? 'admin-dashboard.html' : 'user-dashboard.html';
      } else {
        window.location.href = 'index.html';
      }
    }

    function timeSince(dateString) {
      const date = new Date(dateString);
      const seconds = Math.floor((new Date() - date) / 1000);
      let interval = seconds / 31536000;
      if (interval > 1) return Math.floor(interval) + " years ago";
      interval = seconds / 2592000;
      if (interval > 1) return Math.floor(interval) + " months ago";
      interval = seconds / 86400;
      if (interval > 1) return Math.floor(interval) + " days ago";
      interval = seconds / 3600;
      if (interval > 1) return Math.floor(interval) + " hours ago";
      interval = seconds / 60;
      if (interval > 1) return Math.floor(interval) + " minutes ago";
      return Math.floor(seconds) + " seconds ago";
    }

    function setFilter(cat) {
      currentFilter = cat;
      const btns = document.querySelectorAll('.filter-btn');
      btns.forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      loadFeed();
    }

    async function loadFeed() {
      document.getElementById('loadingFeed').style.display = 'block';
      const container = document.getElementById('feedContainer');
      const errBox = document.getElementById('errorMsg');
      errBox.style.display = 'none';
      
      // clear existing cards but keep spinner and error box
      Array.from(container.children).forEach(c => {
        if (c.id !== 'loadingFeed' && c.id !== 'errorMsg') c.remove();
      });

      try {
        const res = await fetch('http://localhost:3000/api/incidents');
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Failed to load feed');

        document.getElementById('loadingFeed').style.display = 'none';
        
        let incidents = data.incidents;
        if (currentFilter) incidents = incidents.filter(i => i.category === currentFilter);

        if (incidents.length === 0) {
          container.insertAdjacentHTML('beforeend', '<div class="text-muted text-center mt-3">No incidents found.</div>');
          return;
        }

        incidents.forEach(inc => {
          const catClass = `bg-${inc.category.toLowerCase()}`;
          const reporter = inc.is_anon ? 'Anonymous User' : (inc.reporter_name || 'Unknown');
          // Truncate description safely
          let desc = inc.description || '';
          if (desc.length > 100) desc = desc.substring(0, 100) + '...';

          container.insertAdjacentHTML('beforeend', `
            <div class="card-custom d-flex flex-row gap-3">
              <div class="flex-shrink-0 text-center" style="width: 50px;">
                <button class="upvote-btn" onclick="upvote(${inc.report_id}, this)">
                  <i class="bi bi-caret-up-fill"></i>
                  <span class="upvote-count">${inc.upvotes}</span>
                </button>
              </div>
              <div class="flex-grow-1">
                <div class="d-flex justify-content-between align-items-start mb-2">
                  <div>
                    <span class="cat-badge ${catClass}">${inc.category.replace('_', ' ')}</span>
                    <span class="ms-2 text-muted small"><i class="bi bi-geo-alt-fill"></i> ${inc.area_name}</span>
                  </div>
                  <span class="text-muted small">${timeSince(inc.created_at)}</span>
                </div>
                <p class="mb-2" style="font-size: 0.95rem;">${desc}</p>
                <div class="text-muted" style="font-size: 0.75rem;">Reported by: <span class="fw-semibold text-white">${reporter}</span></div>
              </div>
            </div>
          `);
        });
      } catch (err) {
        document.getElementById('loadingFeed').style.display = 'none';
        errBox.textContent = err.message;
        errBox.style.display = 'block';
      }
    }

    async function upvote(id, btnEl) {
      if (!user) {
        alert('Please login to upvote incidents.');
        window.location.href = 'login.html';
        return;
      }
      try {
        const res = await fetch(`http://localhost:3000/api/incidents/${id}/upvote`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Failed to upvote');
        
        const countSpan = btnEl.querySelector('.upvote-count');
        countSpan.textContent = parseInt(countSpan.textContent) + 1;
        btnEl.style.color = 'var(--teal)';
        btnEl.disabled = true;
      } catch (err) {
        alert(err.message);
      }
    }

    document.addEventListener('DOMContentLoaded', loadFeed);
  </script>
</body>
</html>
