<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Users — SafeRoute BD</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/contrast.css" />
  <style>
    :root { --navy: #0D1B2A; --navy-mid: #152235; --navy-light: #1A2D42; --teal: #1DBF8A; --border: rgba(29, 191, 138, 0.15); }
    body { font-family: 'Inter', sans-serif; background: var(--navy); color: #E8EFF8; min-height: 100vh; display: flex; flex-direction: column;}
    .navbar-custom { background: rgba(13,27,42,0.95); border-bottom: 1px solid var(--border); padding: 1rem 0; }
    .navbar-brand-text { font-weight: 700; font-size: 1.25rem; background: linear-gradient(135deg,#1DBF8A,#63E6BE); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .sidebar { width: 250px; background: var(--navy-mid); border-right: 1px solid var(--border); min-height: calc(100vh - 70px); padding-top: 1.5rem; position: fixed; }
    .sidebar a { display: block; color: #C8D8E8; padding: 0.8rem 1.5rem; text-decoration: none; transition: 0.2s; font-size: 0.95rem; }
    .sidebar a:hover, .sidebar a.active { background: rgba(29,191,138,0.1); color: var(--teal); border-right: 3px solid var(--teal); }
    
    .main-content { margin-left: 250px; padding: 2rem; flex-grow: 1; }
    
    .card-custom { background: var(--navy-light); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .table-custom { width: 100%; color: #E8EFF8; margin-bottom:0; }
    .table-custom th { color: #8A9BB0; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; border-bottom: 1px solid var(--border); padding: 1rem 0.5rem; }
    .table-custom td { padding: 1rem 0.5rem; vertical-align: middle; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .role-badge { font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.6rem; border-radius: 6px; }
    .role-ADMIN { background: rgba(220,53,69,0.15); color: #FF8F96; border: 1px solid rgba(220,53,69,0.3); }
    .role-PUBLIC_USER { background: rgba(29,191,138,0.15); color: var(--teal); border: 1px solid var(--border); }
    
    .form-select-sm { background: var(--navy-mid); border: 1px solid var(--border); color: #E8EFF8; }
    .form-select-sm:focus { box-shadow: none; border-color: var(--teal); }
    
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; }
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-custom sticky-top">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-shield-shaded" style="color:var(--teal);font-size:1.4rem;"></i>
        <span class="navbar-brand-text">SafeRoute BD Admin</span>
      </a>
      <button class="btn btn-outline-light btn-sm" onclick="goBack()"><i class="bi bi-arrow-left"></i> Back to Dashboard</button>
    </div>
  </nav>

  <div class="sidebar d-none d-md-block">
    <a href="admin-dashboard.html"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
    <a href="admin-panel.html" class="active"><i class="bi bi-people me-2"></i> Manage Users</a>
    <a href="analytics.html"><i class="bi bi-bar-chart me-2"></i> Analytics</a>
    <a href="alerts.html"><i class="bi bi-bell me-2"></i> Broadcast Alerts</a>
  </div>

  <div class="main-content">
    <h3 class="fw-bold mb-4"><i class="bi bi-people-fill text-teal me-2"></i> User Management</h3>
    
    <div id="errorMsg" class="alert alert-danger" style="display:none;"></div>
    
    <div class="card-custom">
      <div class="text-center my-4" id="loadingUsers">
        <div class="spinner-border text-teal" role="status"></div>
      </div>
      
      <div class="table-responsive" id="tableContainer" style="display:none;">
        <table class="table-custom">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Joined Date</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="usersTbody">
            <!-- populated via js -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function getUser() {
      const token = localStorage.getItem('token');
      if (!token) return null;
      try { return JSON.parse(atob(token.split('.')[1])); } catch(e) { return null; }
    }

    const user = getUser();
    if (!user) window.location.href = 'login.html';
    else if (user.role !== 'ADMIN') window.location.href = 'user-dashboard.html';

    function goBack() { window.location.href = 'admin-dashboard.html'; }

    async function loadUsers() {
      const errBox = document.getElementById('errorMsg');
      errBox.style.display = 'none';
      
      try {
        const res = await fetch('http://localhost:3000/api/admin/users', {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Failed to load users');

        document.getElementById('loadingUsers').style.display = 'none';
        document.getElementById('tableContainer').style.display = 'block';
        
        const tbody = document.getElementById('usersTbody');
        tbody.innerHTML = '';
        
        data.users.forEach(u => {
          const date = new Date(u.created_at).toLocaleDateString('en-US');
          tbody.innerHTML += `
            <tr id="row-${u.user_id}">
              <td class="fw-semibold">${u.full_name}</td>
              <td>${u.email}</td>
              <td><span class="role-badge role-${u.role}">${u.role.replace('_',' ')}</span></td>
              <td>${date}</td>
              <td class="text-end">
                <div class="d-flex justify-content-end align-items-center gap-2">
                  <select class="form-select form-select-sm w-auto" onchange="changeRole(${u.user_id}, this.value)">
                    <option value="PUBLIC_USER" ${u.role === 'PUBLIC_USER' ? 'selected' : ''}>User</option>
                    <option value="ADMIN" ${u.role === 'ADMIN' ? 'selected' : ''}>Admin</option>
                  </select>
                  <button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${u.user_id})"><i class="bi bi-trash"></i></button>
                </div>
              </td>
            </tr>
          `;
        });
      } catch (err) {
        document.getElementById('loadingUsers').style.display = 'none';
        errBox.textContent = err.message;
        errBox.style.display = 'block';
      }
    }

    async function changeRole(id, newRole) {
      if(!confirm('Change user role?')) {
        loadUsers(); // reset select visually
        return;
      }
      try {
        const res = await fetch(`http://localhost:3000/api/admin/users/${id}/role`, {
          method: 'PUT',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}` 
          },
          body: JSON.stringify({ role: newRole })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message);
        loadUsers(); // reload to show new badge
      } catch (err) {
        alert(err.message);
      }
    }

    async function deleteUser(id) {
      if(!confirm('Are you sure you want to permanently delete this user?')) return;
      try {
        const res = await fetch(`http://localhost:3000/api/admin/users/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message);
        document.getElementById(`row-${id}`).remove();
      } catch (err) {
        alert(err.message);
      }
    }

    document.addEventListener('DOMContentLoaded', loadUsers);
  </script>
</body>
</html>
