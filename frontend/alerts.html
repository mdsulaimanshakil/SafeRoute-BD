<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safety Alerts — SafeRoute BD</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/contrast.css" />
  <style>
    :root { --navy: #0D1B2A; --navy-light: #1A2D42; --teal: #1DBF8A; --border: rgba(29, 191, 138, 0.15); }
    body { font-family: 'Inter', sans-serif; background: var(--navy); color: #E8EFF8; min-height: 100vh; }
    .navbar-custom { background: rgba(13,27,42,0.95); border-bottom: 1px solid var(--border); padding: 1rem 0; }
    .navbar-brand-text { font-weight: 700; font-size: 1.25rem; background: linear-gradient(135deg,#1DBF8A,#63E6BE); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .alert-card { background: var(--navy-light); border: 1px solid var(--border); border-left: 5px solid; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    
    .sev-CRITICAL { border-left-color: #dc3545; }
    .sev-CRITICAL .badge-sev { background: rgba(220,53,69,0.15); color: #dc3545; border: 1px solid rgba(220,53,69,0.3); }
    
    .sev-HIGH { border-left-color: #fd7e14; }
    .sev-HIGH .badge-sev { background: rgba(253,126,20,0.15); color: #fd7e14; border: 1px solid rgba(253,126,20,0.3); }
    
    .sev-MEDIUM { border-left-color: #ffc107; }
    .sev-MEDIUM .badge-sev { background: rgba(255,193,7,0.15); color: #ffc107; border: 1px solid rgba(255,193,7,0.3); }
    
    .sev-LOW { border-left-color: #198754; }
    .sev-LOW .badge-sev { background: rgba(25,135,84,0.15); color: #198754; border: 1px solid rgba(25,135,84,0.3); }
    
    .badge-sev { font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 6px; text-transform: uppercase; }
    
    /* modal */
    .modal-content { background: var(--navy); color: #E8EFF8; border: 1px solid var(--border); }
    .modal-header { border-bottom: 1px solid var(--border); }
    .modal-footer { border-top: 1px solid var(--border); }
    .form-control, .form-select { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; }
    .form-control:focus, .form-select:focus { background: rgba(255,255,255,0.08); border-color: var(--teal); color: #fff; box-shadow: none; }
    /* Fix white dropdown options and dark theme readability */
    option { background-color: var(--navy-light); color: #fff; }
    textarea.form-control { background-color: var(--navy-light); color: #fff; }
    .form-label { color: #C8D6E5 !important; }
    .form-check-label { color: #C8D6E5 !important; }
    .alert-danger { background: rgba(220,53,69,0.15); color: #ff8a98; border: 1px solid rgba(220,53,69,0.3); }
    .alert-success { background: rgba(29,191,138,0.15); color: #63E6BE; border: 1px solid rgba(29,191,138,0.3); }
  </style>
</head>
<body>
  <nav class="navbar navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-shield-shaded" style="color:var(--teal);font-size:1.4rem;"></i>
        <span class="navbar-brand-text">SafeRoute BD</span>
      </a>
      <button class="btn btn-outline-light btn-sm" onclick="goBack()"><i class="bi bi-arrow-left"></i> Back</button>
    </div>
  </nav>

  <div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h3 class="fw-bold m-0"><i class="bi bi-broadcast text-danger me-2"></i> Safety Alerts</h3>
        <p class="text-muted small m-0 mt-1">Official broadcast messages from administrators.</p>
      </div>
      <button class="btn btn-danger" id="btnAdminSend" data-bs-toggle="modal" data-bs-target="#alertModal" style="display:none;">
        <i class="bi bi-send-fill me-1"></i> Send Alert
      </button>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8" id="alertsContainer">
        <div id="errorMsg" class="alert alert-danger" style="display:none;"></div>
        <div class="text-center mt-5" id="loadingAlerts">
          <div class="spinner-border text-danger" role="status"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Admin Send Alert Modal -->
  <div class="modal fade" id="alertModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form onsubmit="sendAlert(event)">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">Broadcast New Alert</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div id="modalError" class="alert alert-danger" style="display:none;"></div>
            <div class="mb-3">
              <label class="form-label text-muted small fw-bold">Zone</label>
              <select class="form-select" id="zoneSelect" required>
                <option value="">Loading zones...</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label text-muted small fw-bold">Severity</label>
              <select class="form-select" id="severitySelect" required>
                <option value="LOW">Low</option>
                <option value="MEDIUM">Medium</option>
                <option value="HIGH">High</option>
                <option value="CRITICAL">Critical</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label text-muted small fw-bold">Message</label>
              <textarea class="form-control" id="messageInput" rows="3" required></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-danger" id="submitAlertBtn">
              <span class="spinner-border spinner-border-sm me-1" id="alertSpinner" style="display:none;"></span> Broadcast
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function getUser() {
      const token = localStorage.getItem('token');
      if (!token) return null;
      try { return JSON.parse(atob(token.split('.')[1])); } catch(e) { return null; }
    }

    const user = getUser();
    if (user && user.role === 'ADMIN') {
      document.getElementById('btnAdminSend').style.display = 'block';
      loadZones();
    }

    function goBack() { 
      if (user) {
        window.location.href = user.role === 'ADMIN' ? 'admin-dashboard.html' : 'user-dashboard.html';
      } else {
        window.location.href = 'index.html';
      }
    }

    async function loadAlerts() {
      document.getElementById('loadingAlerts').style.display = 'block';
      const container = document.getElementById('alertsContainer');
      const errBox = document.getElementById('errorMsg');
      errBox.style.display = 'none';

      // Keep only loading and error
      Array.from(container.children).forEach(c => {
        if (c.id !== 'loadingAlerts' && c.id !== 'errorMsg') c.remove();
      });

      try {
        const res = await fetch('http://localhost:3000/api/alerts');
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Failed to load alerts');

        document.getElementById('loadingAlerts').style.display = 'none';
        
        if (data.alerts.length === 0) {
          container.insertAdjacentHTML('beforeend', '<div class="text-muted text-center mt-3">No active alerts.</div>');
          return;
        }

        data.alerts.forEach(a => {
          const timeStr = new Date(a.broadcast).toLocaleString();
          container.insertAdjacentHTML('beforeend', `
            <div class="alert-card sev-${a.severity}">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <span class="badge-sev">${a.severity}</span>
                <span class="text-muted small">${timeStr}</span>
              </div>
              <p class="mb-2" style="font-size: 0.95rem;">${a.message}</p>
              <div class="text-muted small"><i class="bi bi-geo-alt-fill"></i> ${a.area_name}</div>
            </div>
          `);
        });
      } catch (err) {
        document.getElementById('loadingAlerts').style.display = 'none';
        errBox.textContent = err.message;
        errBox.style.display = 'block';
      }
    }

    async function loadZones() {
      try {
        const res = await fetch('http://localhost:3000/api/zones', {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        const data = await res.json();
        const select = document.getElementById('zoneSelect');
        select.innerHTML = '<option value="">Select Zone...</option>';
        if (data.success) {
          data.zones.forEach(z => {
            select.innerHTML += `<option value="${z.zone_id}">${z.area_name}</option>`;
          });
        }
      } catch (e) {
        console.error('Failed to load zones for modal');
      }
    }

    async function sendAlert(e) {
      e.preventDefault();
      const errBox = document.getElementById('modalError');
      errBox.style.display = 'none';
      document.getElementById('submitAlertBtn').disabled = true;
      document.getElementById('alertSpinner').style.display = 'inline-block';

      const body = {
        zone_id: document.getElementById('zoneSelect').value,
        severity: document.getElementById('severitySelect').value,
        message: document.getElementById('messageInput').value
      };

      try {
        const res = await fetch('http://localhost:3000/api/alerts', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}` 
          },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Failed to send alert');
        
        // Hide modal
        bootstrap.Modal.getInstance(document.getElementById('alertModal')).hide();
        // Reset form
        e.target.reset();
        // Reload alerts
        loadAlerts();
      } catch (err) {
        errBox.textContent = err.message;
        errBox.style.display = 'block';
      } finally {
        document.getElementById('submitAlertBtn').disabled = false;
        document.getElementById('alertSpinner').style.display = 'none';
      }
    }

    document.addEventListener('DOMContentLoaded', loadAlerts);
  </script>
</body>
</html>
