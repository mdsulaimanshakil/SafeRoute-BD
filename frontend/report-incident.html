<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report Incident — SafeRoute BD</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/contrast.css" />
  <style>
    :root { --navy: #0D1B2A; --navy-light: #1A2D42; --teal: #1DBF8A; --border: rgba(29, 191, 138, 0.15); }
    body { font-family: 'Inter', sans-serif; background: var(--navy); color: #E8EFF8; min-height: 100vh; }
    .navbar-custom { background: rgba(13,27,42,0.95); border-bottom: 1px solid var(--border); padding: 1rem 0; }
    .navbar-brand-text { font-weight: 700; font-size: 1.25rem; background: linear-gradient(135deg,#1DBF8A,#63E6BE); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card-custom { background: var(--navy-light); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .form-control, .form-select { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; }
    .form-control:focus, .form-select:focus { background: rgba(255,255,255,0.08); border-color: var(--teal); color: #fff; box-shadow: none; }
    /* Fix dropdown options and text areas */
    option { background-color: var(--navy-light); color: #fff; }
    textarea.form-control { background-color: var(--navy-light); color: #fff; }
    .btn-teal { background: var(--teal); color: #fff; font-weight: 600; padding: 0.75rem; border: none; border-radius: 8px; width: 100%; transition: all 0.2s; }
    .btn-teal:hover { background: #159a6e; color: #fff; }
    .form-label { color: #C8D6E5; font-size: 0.85rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; }
    .form-check-label { color: #C8D6E5 !important; }
    .alert-danger { background: rgba(220,53,69,0.15); color: #ff8a98; border: 1px solid rgba(220,53,69,0.3); }
    .alert-success { background: rgba(29,191,138,0.15); color: #63E6BE; border: 1px solid rgba(29,191,138,0.3); }
  </style>
</head>
<body>
  <nav class="navbar navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-shield-shaded" style="color:var(--teal);font-size:1.4rem;"></i>
        <span class="navbar-brand-text">SafeRoute BD</span>
      </a>
      <button class="btn btn-outline-light btn-sm" onclick="goBack()"><i class="bi bi-arrow-left"></i> Back</button>
    </div>
  </nav>

  <div class="container mt-5 mb-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <h3 class="mb-4 fw-bold"><i class="bi bi-exclamation-triangle-fill text-warning me-2"></i> Report Incident</h3>
        <div class="card-custom">
          <div id="errorMsg" class="alert alert-danger" style="display:none;"></div>
          <div id="successMsg" class="alert alert-success" style="display:none;">Report submitted successfully! Redirecting...</div>
          
          <form id="incidentForm" onsubmit="submitReport(event)">
            <div class="mb-3">
              <label class="form-label">Category</label>
              <select class="form-select" id="category" required>
                <option value="">Select Category...</option>
                <option value="THEFT">Theft</option>
                <option value="HARASSMENT">Harassment</option>
                <option value="ACCIDENT">Accident</option>
                <option value="ROAD_HAZARD">Road Hazard</option>
                <option value="SUSPICIOUS">Suspicious Activity</option>
                <option value="WATERLOGGING">Waterlogging</option>
                <option value="OTHER">Other</option>
              </select>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Zone</label>
              <select class="form-select" id="zone_id" required>
                <option value="">Loading zones...</option>
              </select>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Description (Min 10 chars)</label>
              <textarea class="form-control" id="description" rows="4" required minlength="10" placeholder="Provide details about the incident..."></textarea>
            </div>
            
            <div class="mb-4 form-check">
              <input type="checkbox" class="form-check-input" id="is_anon">
              <label class="form-check-label text-muted" for="is_anon">Submit Anonymously</label>
            </div>
            
            <button type="submit" class="btn-teal" id="submitBtn">
              <span class="spinner-border spinner-border-sm me-2" id="btnSpinner" style="display:none;"></span> Submit Report
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    function getUser() {
      const token = localStorage.getItem('token');
      if (!token) return null;
      try { return JSON.parse(atob(token.split('.')[1])); } catch(e) { return null; }
    }

    const user = getUser();
    if (!user) window.location.href = 'login.html';

    function goBack() { window.location.href = 'user-dashboard.html'; }

    async function loadZones() {
      try {
        const res = await fetch('http://localhost:3000/api/zones', {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        const data = await res.json();
        const select = document.getElementById('zone_id');
        select.innerHTML = '<option value="">Select Zone...</option>';
        if (data.success) {
          data.zones.forEach(z => {
            select.innerHTML += `<option value="${z.zone_id}">${z.area_name}</option>`;
          });
        }
      } catch (err) {
        document.getElementById('errorMsg').textContent = 'Failed to load zones.';
        document.getElementById('errorMsg').style.display = 'block';
      }
    }

    async function submitReport(e) {
      e.preventDefault();
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('btnSpinner').style.display = 'inline-block';
      
      const body = {
        category: document.getElementById('category').value,
        zone_id: document.getElementById('zone_id').value,
        description: document.getElementById('description').value,
        is_anon: document.getElementById('is_anon').checked ? 1 : 0
      };

      try {
        const res = await fetch('http://localhost:3000/api/incidents', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}` 
          },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Failed to submit report');
        
        document.getElementById('incidentForm').style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
        setTimeout(() => goBack(), 2000);
      } catch (err) {
        document.getElementById('errorMsg').textContent = err.message;
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('btnSpinner').style.display = 'none';
      }
    }

    document.addEventListener('DOMContentLoaded', loadZones);
  </script>
</body>
</html>
