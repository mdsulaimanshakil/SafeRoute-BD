<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — SafeRoute BD</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/contrast.css" />
  <style>
    :root { --navy: #0D1B2A; --navy-light: #1A2D42; --teal: #1DBF8A; --border: rgba(29, 191, 138, 0.15); }
    body { font-family: 'Inter', sans-serif; background: var(--navy); color: #E8EFF8; min-height: 100vh; }
    .navbar-custom { background: rgba(13,27,42,0.95); border-bottom: 1px solid var(--border); padding: 1rem 0; }
    .navbar-brand-text { font-weight: 700; font-size: 1.25rem; background: linear-gradient(135deg,#1DBF8A,#63E6BE); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card-custom { background: var(--navy-light); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .stat-val { font-size: 2rem; font-weight: 700; color: #fff; line-height: 1; margin-bottom: 0.5rem; }
    .stat-label { font-size: 0.85rem; color: #D7E3EE; text-transform: uppercase; font-weight: 600; }
    canvas { max-width: 100%; height: auto; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav class="navbar navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-shield-shaded" style="color:var(--teal);font-size:1.4rem;"></i>
        <span class="navbar-brand-text">SafeRoute BD</span>
      </a>
      <button class="btn btn-outline-light btn-sm" onclick="goBack()"><i class="bi bi-arrow-left"></i> Back</button>
    </div>
  </nav>

  <div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h3 class="fw-bold m-0"><i class="bi bi-bar-chart-fill text-info me-2"></i> Analytics Dashboard</h3>
    </div>

    <div id="errorMsg" class="alert alert-danger" style="display:none;"></div>
    
    <div class="text-center mt-5" id="loadingData">
      <div class="spinner-border text-info" role="status"></div>
      <p class="mt-2 text-muted">Gathering intelligence...</p>
    </div>

    <div id="dashboardContent" style="display:none;">
      <!-- Summary Cards -->
      <div class="row mb-4">
        <div class="col-6 col-md-3">
          <div class="card-custom text-center">
            <div class="stat-val" id="statTotal">0</div>
            <div class="stat-label">Total Reports</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card-custom text-center">
            <div class="stat-val text-success" id="statResolved">0</div>
            <div class="stat-label">Resolved</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card-custom text-center">
            <div class="stat-val text-warning" id="statPending">0</div>
            <div class="stat-label">Pending</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card-custom text-center">
            <div class="stat-val text-danger" id="statOpen">0</div>
            <div class="stat-label">Open</div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-lg-8">
          <div class="card-custom">
            <h6 class="text-muted text-uppercase mb-3 fw-bold">7-Day Incident Trend</h6>
            <canvas id="trendChart" height="100"></canvas>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="card-custom">
            <h6 class="text-muted text-uppercase mb-3 fw-bold">By Zone</h6>
            <canvas id="zoneChart" height="220"></canvas>
          </div>
        </div>
      </div>
      
      <div class="row mt-2">
        <div class="col-12">
          <div class="card-custom">
            <h6 class="text-muted text-uppercase mb-3 fw-bold">By Category</h6>
            <canvas id="categoryChart" height="80"></canvas>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    function getUser() {
      const token = localStorage.getItem('token');
      if (!token) return null;
      try { return JSON.parse(atob(token.split('.')[1])); } catch(e) { return null; }
    }

    const user = getUser();
    if (!user) window.location.href = 'login.html';
    else if (user.role !== 'ADMIN') window.location.href = 'user-dashboard.html';

    function goBack() { window.location.href = 'admin-dashboard.html'; }

    // Setup global defaults for charts
    Chart.defaults.color = '#D7E3EE';
    Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.10)';

    async function fetchAnalytics() {
      try {
        const headers = { 'Authorization': `Bearer ${localStorage.getItem('token')}` };
        
        const [sumRes, catRes, zoneRes, trendRes] = await Promise.all([
          fetch('http://localhost:3000/api/analytics/summary', { headers }),
          fetch('http://localhost:3000/api/analytics/by-category', { headers }),
          fetch('http://localhost:3000/api/analytics/by-zone', { headers }),
          fetch('http://localhost:3000/api/analytics/trend', { headers })
        ]);

        if (!sumRes.ok || !catRes.ok || !zoneRes.ok || !trendRes.ok) 
          throw new Error('Failed to fetch analytics data');

        const [sumData, catData, zoneData, trendData] = await Promise.all([
          sumRes.json(), catRes.json(), zoneRes.json(), trendRes.json()
        ]);

        document.getElementById('loadingData').style.display = 'none';
        document.getElementById('dashboardContent').style.display = 'block';

        // Summary
        const s = sumData.summary;
        document.getElementById('statTotal').textContent = s.total_incidents || 0;
        document.getElementById('statResolved').textContent = s.resolved_count || 0;
        document.getElementById('statPending').textContent = s.pending_count || 0;
        document.getElementById('statOpen').textContent = s.open_count || 0;

        // Trend Line Chart
        new Chart(document.getElementById('trendChart'), {
          type: 'line',
          data: {
            labels: trendData.trend.map(d => new Date(d.day).toLocaleDateString('en-US', {month:'short', day:'numeric'})),
            datasets: [{
              label: 'Incidents',
              data: trendData.trend.map(d => d.incident_count),
              borderColor: '#1DBF8A',
              backgroundColor: 'rgba(29, 191, 138, 0.1)',
              borderWidth: 2,
              fill: true,
              tension: 0.3
            }]
          },
          options: { plugins: { legend: { display: false } } }
        });

        // Category Bar Chart
        new Chart(document.getElementById('categoryChart'), {
          type: 'bar',
          data: {
            labels: catData.categories.map(d => d.category),
            datasets: [{
              label: 'Incidents',
              data: catData.categories.map(d => d.incident_count),
              backgroundColor: '#F59E0B',
              borderRadius: 4
            }]
          },
          options: { plugins: { legend: { display: false } } }
        });

        // Zone Pie Chart
        new Chart(document.getElementById('zoneChart'), {
          type: 'doughnut',
          data: {
            labels: zoneData.zones.map(d => d.area_name),
            datasets: [{
              data: zoneData.zones.map(d => d.incident_count),
              backgroundColor: ['#1DBF8A', '#FF8F96', '#6EA8FE', '#F59E0B', '#C8D8E8'],
              borderWidth: 0
            }]
          },
          options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
        });

      } catch (err) {
        document.getElementById('loadingData').style.display = 'none';
        document.getElementById('errorMsg').textContent = err.message;
        document.getElementById('errorMsg').style.display = 'block';
      }
    }

    document.addEventListener('DOMContentLoaded', fetchAnalytics);
  </script>
</body>
</html>
