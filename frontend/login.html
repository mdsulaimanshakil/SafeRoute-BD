<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to SafeRoute BD — your community safety and incident management system." />
  <title>Sign In — SafeRoute BD</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/contrast.css" />
  <style>
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
    .shake { animation: shake 0.5s ease; }

    /* Feature pills below card */
    .features {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }
    .feature-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0.35rem 0.75rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--navy-border);
      border-radius: 999px;
      font-size: 0.72rem;
      color: var(--text-muted);
    }
    .feature-pill span { color: var(--teal); font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="bg-animated" aria-hidden="true"></div>

  <main class="page-wrapper">
    <div class="auth-card" id="authCard">

      <!-- Brand Header -->
      <div class="brand">
        <div class="brand-logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z"/>
            <path fill="rgba(255,255,255,0.3)" d="M12 5.5L6.5 8v4.2c0 3.85 2.55 7.45 5.5 8.35 2.95-.9 5.5-4.5 5.5-8.35V8L12 5.5z"/>
          </svg>
        </div>
        <div class="brand-name">SafeRoute BD</div>
        <div class="brand-tagline">Report. Track. Stay Safe.</div>
      </div>

      <!-- Form Header -->
      <h1 class="form-title">Welcome Back</h1>
      <p class="form-subtitle">Sign in to your account to continue</p>

      <!-- Alert box -->
      <div id="alertBox" class="alert" role="alert" aria-live="assertive" style="display:none;"></div>

      <!-- Login Form -->
      <form id="loginForm" novalidate autocomplete="on">

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input
              id="email"
              name="email"
              type="email"
              class="form-input"
              placeholder="you@example.com"
              autocomplete="email"
              aria-describedby="emailError"
              aria-required="true"
            />
          </div>
          <div id="emailError" class="field-error" aria-live="polite"></div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">
            Password
          </label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              id="password"
              name="password"
              type="password"
              class="form-input has-right-icon"
              placeholder="Your password"
              autocomplete="current-password"
              aria-describedby="passwordError"
              aria-required="true"
            />
            <button type="button" class="input-icon-right" id="togglePass" aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div id="passwordError" class="field-error" aria-live="polite"></div>
          <a href="#" class="forgot-link" id="forgotPasswordLink"
             onclick="event.preventDefault(); alert('Password reset functionality coming soon!');">
            Forgot password?
          </a>
        </div>

        <!-- Submit -->
        <button type="submit" id="submitBtn" class="btn-primary">
          Sign In
        </button>

      </form>

      <div class="divider">new to SafeRoute BD?</div>
      <p class="auth-link">
        Don't have an account? <a href="register.html" id="registerLink">Create one free</a>
      </p>

    </div><!-- /.auth-card -->

    <!-- Feature pills -->
    <div class="features" aria-label="Platform features">
      <div class="feature-pill"><span>📍</span> Live Incident Tracking</div>
      <div class="feature-pill"><span>🔔</span> Real-time Alerts</div>
      <div class="feature-pill"><span>🛡️</span> Community Safety</div>
    </div>

  </main>

  <footer class="page-footer">
    &copy; 2024 <span>SafeRoute BD</span> — Smart Community Safety System, Bangladesh
  </footer>

  <script src="js/login.js"></script>
</body>
</html>
