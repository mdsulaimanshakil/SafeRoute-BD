<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emergency Contacts — SafeRoute BD</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/contrast.css" />
  <style>
    :root { --navy: #0D1B2A; --navy-light: #1A2D42; --teal: #1DBF8A; --border: rgba(29, 191, 138, 0.15); }
    body { font-family: 'Inter', sans-serif; background: var(--navy); color: #E8EFF8; min-height: 100vh; }
    .navbar-custom { background: rgba(13,27,42,0.95); border-bottom: 1px solid var(--border); padding: 1rem 0; }
    .navbar-brand-text { font-weight: 700; font-size: 1.25rem; background: linear-gradient(135deg,#1DBF8A,#63E6BE); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card-custom { background: var(--navy-light); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .form-control, .form-select { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; }
    .form-control:focus, .form-select:focus { background: rgba(255,255,255,0.08); border-color: var(--teal); color: #fff; box-shadow: none; }
    .btn-teal { background: var(--teal); color: #fff; font-weight: 600; padding: 0.5rem 1rem; border: none; border-radius: 8px; transition: all 0.2s; }
    .btn-teal:hover { background: #159a6e; color: #fff; }
    .btn-danger-soft { background: rgba(220,53,69,0.15); color: #FF8F96; border: 1px solid rgba(220,53,69,0.3); border-radius: 8px; padding: 0.3rem 0.7rem; font-size: 0.85rem; }
    .btn-danger-soft:hover { background: rgba(220,53,69,0.25); color: #FF8F96; }
    .relation-badge { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 0.2rem 0.5rem; border-radius: 6px; font-size: 0.75rem; color: #C8D8E8; }
  </style>
</head>
<body>
  <nav class="navbar navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-shield-shaded" style="color:var(--teal);font-size:1.4rem;"></i>
        <span class="navbar-brand-text">SafeRoute BD</span>
      </a>
      <button class="btn btn-outline-light btn-sm" onclick="goBack()"><i class="bi bi-arrow-left"></i> Back</button>
    </div>
  </nav>

  <div class="container mt-4 mb-5">
    <div class="row">
      <!-- Add form -->
      <div class="col-md-5 col-lg-4 mb-4">
        <h5 class="mb-3 fw-bold">Add Contact</h5>
        <div class="card-custom">
          <form id="contactForm" onsubmit="addContact(event)">
            <div id="addError" class="alert alert-danger" style="display:none; padding:0.5rem; font-size:0.85rem;"></div>
            <div class="mb-3">
              <label class="form-label text-muted small text-uppercase fw-bold">Name</label>
              <input type="text" class="form-control form-control-sm" id="cName" required>
            </div>
            <div class="mb-3">
              <label class="form-label text-muted small text-uppercase fw-bold">Phone</label>
              <input type="tel" class="form-control form-control-sm" id="cPhone" required>
            </div>
            <div class="mb-3">
              <label class="form-label text-muted small text-uppercase fw-bold">Relation</label>
              <select class="form-select form-select-sm" id="cRelation" required>
                <option value="">Select...</option>
                <option value="Family">Family</option>
                <option value="Friend">Friend</option>
                <option value="Colleague">Colleague</option>
                <option value="Doctor">Doctor</option>
                <option value="Police">Police</option>
              </select>
            </div>
            <button type="submit" class="btn-teal w-100 btn-sm" id="addBtn">
              <span class="spinner-border spinner-border-sm me-1" id="addSpinner" style="display:none;"></span> Add Contact
            </button>
          </form>
        </div>
      </div>
      
      <!-- List -->
      <div class="col-md-7 col-lg-8">
        <h5 class="mb-3 fw-bold">My Emergency Contacts</h5>
        <div id="listError" class="alert alert-danger" style="display:none; padding:0.5rem; font-size:0.85rem;"></div>
        <div id="contactsContainer">
          <div class="text-center mt-4" id="loadingContacts">
            <div class="spinner-border text-success" role="status"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function getUser() {
      const token = localStorage.getItem('token');
      if (!token) return null;
      try { return JSON.parse(atob(token.split('.')[1])); } catch(e) { return null; }
    }

    const user = getUser();
    if (!user) window.location.href = 'login.html';

    function goBack() { window.location.href = 'user-dashboard.html'; }

    async function loadContacts() {
      document.getElementById('loadingContacts').style.display = 'block';
      const container = document.getElementById('contactsContainer');
      const errBox = document.getElementById('listError');
      errBox.style.display = 'none';

      try {
        const res = await fetch('http://localhost:3000/api/emergency/contacts', {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Failed to load contacts');

        document.getElementById('loadingContacts').style.display = 'none';
        
        // Keep loading div, replace rest
        container.innerHTML = '<div class="text-center mt-4" id="loadingContacts" style="display:none;"><div class="spinner-border text-success" role="status"></div></div>';
        
        if (data.contacts.length === 0) {
          container.innerHTML += '<div class="text-muted text-center mt-3">No emergency contacts added yet.</div>';
          return;
        }

        data.contacts.forEach(c => {
          container.innerHTML += `
            <div class="card-custom d-flex justify-content-between align-items-center" id="contact-${c.contact_id}">
              <div>
                <h6 class="mb-1">${c.name}</h6>
                <div class="text-muted small mb-2"><i class="bi bi-telephone-fill me-1"></i> ${c.phone}</div>
                <span class="relation-badge">${c.relation}</span>
              </div>
              <button class="btn btn-danger-soft" onclick="deleteContact(${c.contact_id})">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          `;
        });
      } catch (err) {
        document.getElementById('loadingContacts').style.display = 'none';
        errBox.textContent = err.message;
        errBox.style.display = 'block';
      }
    }

    async function addContact(e) {
      e.preventDefault();
      const errBox = document.getElementById('addError');
      errBox.style.display = 'none';
      document.getElementById('addBtn').disabled = true;
      document.getElementById('addSpinner').style.display = 'inline-block';

      const body = {
        name: document.getElementById('cName').value,
        phone: document.getElementById('cPhone').value,
        relation: document.getElementById('cRelation').value
      };

      try {
        const res = await fetch('http://localhost:3000/api/emergency/contacts', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}` 
          },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Failed to add contact');
        
        document.getElementById('contactForm').reset();
        loadContacts();
      } catch (err) {
        errBox.textContent = err.message;
        errBox.style.display = 'block';
      } finally {
        document.getElementById('addBtn').disabled = false;
        document.getElementById('addSpinner').style.display = 'none';
      }
    }

    async function deleteContact(id) {
      if (!confirm('Are you sure you want to delete this emergency contact?')) return;
      
      try {
        const res = await fetch(`http://localhost:3000/api/emergency/contacts/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Failed to delete contact');
        
        const el = document.getElementById(`contact-${id}`);
        if(el) el.remove();
        
        // If empty now
        const container = document.getElementById('contactsContainer');
        if (container.children.length === 1) { // just the hidden spinner
            container.innerHTML += '<div class="text-muted text-center mt-3">No emergency contacts added yet.</div>';
        }
      } catch (err) {
        alert(err.message);
      }
    }

    document.addEventListener('DOMContentLoaded', loadContacts);
  </script>
</body>
</html>
